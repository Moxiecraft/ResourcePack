name: Build and Release Resource Pack

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write  # required to create releases

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version/tag
        id: meta
        run: |
          TAG="$(date -u +'%Y-%m-%d-%H%M')"
          ZIP_NAME="resource-pack-$TAG.zip"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"


      - name: Create zip (exclude folders)
        run: |
          ZIP="${{ steps.meta.outputs.zip_name }}"

          # Adjust excludes to your project:
          # - exclude GitHub workflow files, git metadata, and any dev-only folders
          zip -r "$ZIP" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "assets/minecraft/textures/*" \
            -x "*.md"

          ls -lah "$ZIP"

      - name: Compute SHA1
        id: sha1
        run: |
          FILE="${{ steps.meta.outputs.zip_name }}"
          HASH=$(sha1sum "$FILE" | awk '{print $1}')
          echo "sha1=$HASH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: ${{ steps.meta.outputs.zip_name }}
          generate_release_notes: true
          body: |
            ## Resource Pack Release

            **SHA1 Hash:**
            `${{ steps.sha1.outputs.sha1 }}`